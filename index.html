<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#0a0e1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="বিশ্বকাপ ২০২৬">
<link rel="manifest" href="manifest.json">
<title>বিশ্বকাপ ২০২৬</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0e1a;--surface:#111827;--card:#1a2235;--border:#1e2d45;
  --gold:#f5c518;--gold-dim:#6b4f00;--green:#22c55e;--green-dim:#14532d;
  --blue:#3b82f6;--text:#f0f4ff;--muted:#6b7fa3;--radius:12px;--radius-sm:8px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;overflow-x:hidden}
.app-header{position:sticky;top:0;z-index:100;background:rgba(10,14,26,0.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 14px 8px}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.app-title{display:flex;align-items:center;gap:8px}
.app-title h1{font-size:17px;font-weight:700;color:var(--text)}
.app-title .sub{font-size:10px;color:var(--muted);margin-top:1px}
.notif-btn{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:20px;padding:6px 11px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .2s}
.notif-btn.on{background:var(--green-dim);border-color:var(--green);color:var(--green)}
.search-wrap{position:relative;margin-bottom:8px}
.search-wrap .ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none}
.search-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;padding:8px 12px 8px 32px;outline:none}
.search-input:focus{border-color:var(--blue)}
.search-input::placeholder{color:var(--muted)}
.nav-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border)}
.nav-tab{flex:1;padding:10px 4px;text-align:center;font-size:12px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-weight:500}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.filter-row{display:flex;gap:5px;overflow-x:auto;padding:8px 14px 6px;scrollbar-width:none;background:var(--surface);border-bottom:1px solid var(--border)}
.filter-row::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--muted);font-size:11px;cursor:pointer;transition:all .2s;white-space:nowrap}
.chip.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold)}
.stats-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border)}
.stat-item{flex:1;text-align:center;padding:10px 4px;border-right:1px solid var(--border);cursor:pointer}
.stat-item:last-child{border-right:none}
.stat-num{font-size:18px;font-weight:700;color:var(--gold)}
.stat-label{font-size:10px;color:var(--muted);margin-top:1px}
.today-banner{background:linear-gradient(135deg,#0f2027,#1a3a2a);border-bottom:1px solid var(--border);padding:9px 14px;display:flex;align-items:center;gap:8px}
.live-dot{width:7px;height:7px;background:var(--green);border-radius:50%;flex-shrink:0;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.5)}}
.today-text{font-size:13px;color:var(--text)}
.today-count{font-weight:700;color:var(--gold)}
.no-today{padding:9px 14px;font-size:12px;color:var(--muted);border-bottom:1px solid var(--border)}
.main{padding:0 12px 80px}
.day-section{margin-top:14px}
.day-header{display:flex;justify-content:space-between;align-items:center;padding:4px 2px;margin-bottom:7px;border-bottom:1px solid var(--border)}
.day-name{font-size:12px;font-weight:600;color:var(--muted)}
.day-name.hl{color:var(--gold)}
.today-tag{font-size:9px;background:var(--gold-dim);color:var(--gold);border-radius:20px;padding:2px 6px;margin-left:5px;font-weight:700}
.day-count{font-size:10px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2px 7px}
.match-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:11px 13px;margin-bottom:7px;display:grid;grid-template-columns:52px 1fr;gap:10px;position:relative;overflow:hidden}
.match-card.is-today::before,.match-card.is-final::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.match-card.is-today{border-color:var(--green-dim)}
.match-card.is-today::before{background:var(--green)}
.match-card.is-final{border-color:var(--gold-dim)}
.match-card.is-final::before{background:var(--gold)}
.time-col{text-align:center;padding-top:4px}
.bd-time{font-size:18px;font-weight:700;color:var(--text);line-height:1;font-variant-numeric:tabular-nums}
.bdt-lbl{font-size:9px;color:var(--muted);margin-top:2px;letter-spacing:.3px}
.teams-row{font-size:14px;font-weight:600;color:var(--text);line-height:1.35;margin-bottom:3px}
.vs{color:var(--muted);font-weight:400;font-size:11px;margin:0 3px}
.venue-row{font-size:11px;color:var(--muted);margin-bottom:4px;display:flex;align-items:center;gap:3px}
.badges{display:flex;flex-wrap:wrap;gap:3px}
.badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;display:inline-block}
.badge-group{background:#1e3a5f;color:#93c5fd}
.badge-r32{background:#2d1b69;color:#a78bfa}
.badge-r16{background:#1a3a2a;color:#4ade80}
.badge-qf{background:#3b2000;color:#fbbf24}
.badge-sf{background:#3b0000;color:#f87171}
.badge-bronze{background:#1a1a1a;color:#9ca3af}
.badge-final{background:#2d1f00;color:#f5c518}
.badge-grp{background:#12263a;color:#60a5fa}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-bg.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;padding:0 0 24px;transform:translateY(20px);transition:transform .25s}
.modal-bg.open .modal{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:4px;margin:10px auto 6px}
.modal-header{padding:8px 16px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-title{font-size:15px;font-weight:700;color:var(--text)}
.modal-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:0 4px}
.modal-body{padding:12px 16px}
.grp-block{margin-bottom:8px;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.grp-header{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--card);cursor:pointer;font-size:13px;font-weight:600;color:var(--text)}
.grp-header .arr{transition:transform .25s;color:var(--muted)}
.grp-header.open .arr{transform:rotate(180deg)}
.grp-teams{display:none;padding:6px 14px 10px;background:var(--bg)}
.grp-teams.open{display:block}
.team-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.team-row:last-child{border-bottom:none}
.team-flag{font-size:18px;width:26px;text-align:center;flex-shrink:0}
.teams-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.team-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;display:flex;align-items:center;gap:8px}
.team-card .flag{font-size:20px;flex-shrink:0}
.team-card .tname{font-size:12px;font-weight:600;color:var(--text)}
.team-card .tgrp{font-size:10px;color:var(--muted)}
.stadium-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.stadium-info .sname{font-size:13px;font-weight:600;color:var(--text)}
.stadium-info .scity{font-size:11px;color:var(--muted);margin-top:2px}
.country-badge{margin-left:auto;flex-shrink:0;font-size:10px;padding:3px 8px;border-radius:20px;font-weight:600;white-space:nowrap}
.cb-us{background:#1a2a4a;color:#93c5fd}
.cb-ca{background:#2a1a1a;color:#f87171}
.cb-mx{background:#1a2a1a;color:#4ade80}
.empty{text-align:center;padding:40px 16px;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:10px}
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--green-dim);border:1px solid var(--green);color:var(--green);border-radius:var(--radius-sm);padding:9px 14px;font-size:12px;opacity:0;transition:all .3s;z-index:999;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.install-banner{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--surface);border-top:1px solid var(--border);padding:12px 14px;display:flex;align-items:center;gap:10px}
.install-banner.hidden{display:none}
.install-info strong{font-size:13px;display:block;color:var(--text)}
.install-info span{font-size:11px;color:var(--muted)}
.install-btn{background:var(--gold);color:#000;border:none;border-radius:var(--radius-sm);padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0}
.install-close{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px;flex-shrink:0;margin-left:auto}
</style>
</head>
<body>

<div class="app-header">
  <div class="header-top">
    <div class="app-title">
      <span style="font-size:22px">🏆</span>
      <div><h1>বিশ্বকাপ ২০২৬</h1><div class="sub">বাংলাদেশ সময় (BDT, GMT+6)</div></div>
    </div>
    <button class="notif-btn" id="notifBtn" onclick="toggleNotif()">
      <span id="notifIcon">🔔</span><span id="notifTxt">Notification</span>
    </button>
  </div>
  <div class="search-wrap">
    <svg class="ico" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="search-input" type="text" id="searchInput" placeholder="দল বা ভেন্যু খুঁজুন..." oninput="renderContent()">
  </div>
</div>

<div class="nav-tabs">
  <div class="nav-tab active" id="tab-schedule" onclick="switchTab('schedule')">📅 সূচি</div>
  <div class="nav-tab" id="tab-groups" onclick="switchTab('groups')">🔵 গ্রুপ</div>
  <div class="nav-tab" id="tab-teams" onclick="switchTab('teams')">👥 দল</div>
  <div class="nav-tab" id="tab-stadiums" onclick="switchTab('stadiums')">🏟️ স্টেডিয়াম</div>
</div>

<div class="filter-row" id="filterRow"></div>

<div class="stats-bar">
  <div class="stat-item" onclick="switchTab('schedule')"><div class="stat-num">104</div><div class="stat-label">ম্যাচ</div></div>
  <div class="stat-item" onclick="switchTab('teams')"><div class="stat-num">48</div><div class="stat-label">দল</div></div>
  <div class="stat-item" onclick="switchTab('stadiums')"><div class="stat-num">16</div><div class="stat-label">স্টেডিয়াম</div></div>
  <div class="stat-item" onclick="switchTab('groups')"><div class="stat-num">12</div><div class="stat-label">গ্রুপ</div></div>
</div>

<div id="todayBanner"></div>
<div class="main" id="mainContent"></div>

<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="modalTitle"></span>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="install-banner hidden" id="installBanner">
  <div class="install-info"><strong>📲 Home Screen-এ যোগ করুন</strong><span>Offline কাজ করবে + notification পাবেন</span></div>
  <button class="install-btn" onclick="installApp()">Install</button>
  <button class="install-close" onclick="document.getElementById('installBanner').classList.add('hidden')">✕</button>
</div>

  {date:'2026-07-14',gH:21,gM:0, t1:'সেমিফাইনাল — ম্যাচ ১',t2:'',v:'ড্যালাস',  s:'sf'},
  {date:'2026-07-15',gH:20,gM:0, t1:'সেমিফাইনাল — ম্যাচ ২',t2:'',v:'আটলান্টা', s:'sf'},
  // ─── তৃতীয় স্থান + ফাইনাল ───
  {date:'2026-07-18',gH:22,gM:0, t1:'তৃতীয় স্থান নির্ধারণ',t2:'',v:'মিয়ামি',                  s:'bronze'},
  {date:'2026-07-19',gH:20,gM:0, t1:'🏆 ফাইনাল',           t2:'',v:'নিউ ইয়র্ক-নিউ জার্সি',s:'final'},
];

// ─── Helpers ────────────────────────────────────────────────────────────────
const MN=['জানুয়ারি','ফেব্রুয়ারি','মার্চ','এপ্রিল','মে','জুন','জুলাই','আগস্ট','সেপ্টেম্বর','অক্টোবর','নভেম্বর','ডিসেম্বর'];
const DN=['রবিবার','সোমবার','মঙ্গলবার','বুধবার','বৃহস্পতিবার','শুক্রবার','শনিবার'];

function getBDT(m){let h=m.gH+6,min=m.gM;if(h>=24)h-=24;return`${String(h).padStart(2,'0')}:${String(min).padStart(2,'0')}`}
function getBDDate(m){const d=new Date(m.date+'T00:00:00Z');if(m.gH+6>=24)d.setUTCDate(d.getUTCDate()+1);return d.toISOString().slice(0,10)}
function todayBDT(){const n=new Date();const b=new Date(n.getTime()+6*3600*1000);return b.toISOString().slice(0,10)}
function fmtDate(s){const d=new Date(s+'T12:00:00Z');return`${DN[d.getUTCDay()]}, ${d.getUTCDate()} ${MN[d.getUTCMonth()]} ${d.getUTCFullYear()}`}
const SLB={group:'গ্রুপ পর্যায়',r32:'রাউন্ড অব ৩২',r16:'রাউন্ড অব ১৬',qf:'কোয়ার্টার ফাইনাল',sf:'সেমিফাইনাল',bronze:'তৃতীয় স্থান',final:'ফাইনাল'};

// ─── Tabs ─────────────────────────────────────────────────────────────────────
let currentTab='schedule', activeFilter='';
function switchTab(t){
  currentTab=t;
  ['schedule','groups','teams','stadiums'].forEach(x=>document.getElementById('tab-'+x).classList.toggle('active',x===t));
  document.getElementById('filterRow').style.display=t==='schedule'?'flex':'none';
  document.getElementById('searchInput').placeholder=
    t==='schedule'?'দল বা ভেন্যু খুঁজুন...':t==='groups'?'গ্রুপ বা দল খুঁজুন...':
    t==='teams'?'দলের নাম খুঁজুন...':'স্টেডিয়াম বা শহর খুঁজুন...';
  renderContent();
}

// ─── Filter chips ──────────────────────────────────────────────────────────────
const CHIPS=[{id:'',label:'সব'},{id:'group',label:'গ্রুপ পর্যায়'},{id:'r32',label:'রাউন্ড ৩২'},
  {id:'r16',label:'রাউন্ড ১৬'},{id:'qf',label:'কোয়ার্টার'},{id:'sf',label:'সেমি'},{id:'final',label:'ফাইনাল'}];
document.getElementById('filterRow').innerHTML=CHIPS.map(c=>`<button class="chip${c.id===activeFilter?' active':''}" onclick="setFilter('${c.id}')">${c.label}</button>`).join('');
function setFilter(id){activeFilter=id;document.querySelectorAll('.chip').forEach((c,i)=>c.classList.toggle('active',CHIPS[i].id===id));renderContent()}

// ─── Render dispatcher ────────────────────────────────────────────────────────
function renderContent(){
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  if(currentTab==='schedule')renderList(q);
  else if(currentTab==='groups')renderGroups(q);
  else if(currentTab==='teams')renderTeams(q);
  else renderStadiums(q);
}

// ─── Schedule ────────────────────────────────────────────────────────────────
function renderList(q){
  const today=todayBDT();
  const todayMs=RAW.filter(m=>getBDDate(m)===today);
  const tb=document.getElementById('todayBanner');
  if(todayMs.length){
    tb.innerHTML=`<div class="today-banner"><div class="live-dot"></div><div class="today-text">আজ <span class="today-count">${todayMs.length}টি</span> ম্যাচ — BDT সময় অনুযায়ী</div></div>`;
  } else {
    const s='2026-06-11',e='2026-07-19';
    tb.innerHTML=`<div class="no-today">${today<s?'টুর্নামেন্ট শুরু হবে ১১ জুন ২০২৬ ⏳':today>e?'টুর্নামেন্ট শেষ হয়েছে 🏆':'আজ কোনো ম্যাচ নেই'}</div>`;
  }
  const filtered=RAW.filter(m=>{
    const txt=(m.t1+m.t2+m.v+(m.g||'')).toLowerCase();
    return(!q||txt.includes(q))&&(!activeFilter||m.s===activeFilter);
  });
  const byDay={};
  filtered.forEach(m=>{const k=getBDDate(m);(byDay[k]=byDay[k]||[]).push(m);});
  const days=Object.keys(byDay).sort();
  const el=document.getElementById('mainContent');
  if(!days.length){el.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><p>কোনো ম্যাচ পাওয়া যায়নি</p></div>';return;}
  el.innerHTML=days.map(day=>{
    const isToday=day===today;
    const ms=byDay[day].sort((a,b)=>getBDT(a).localeCompare(getBDT(b)));
    return`<div class="day-section">
      <div class="day-header">
        <span class="day-name${isToday?' hl':''}">${fmtDate(day)}${isToday?'<span class="today-tag">আজ</span>':''}</span>
        <span class="day-count">${ms.length}টি</span>
      </div>
      ${ms.map(m=>{
        const bdt=getBDT(m);
        const isFinal=m.s==='final';
        const isTdy=getBDDate(m)===today;
        const teams=m.t2?`${m.t1}<span class="vs">বনাম</span>${m.t2}`:m.t1;
        return`<div class="match-card${isFinal?' is-final':''}${isTdy?' is-today':''}">
          <div class="time-col">
            <div class="bd-time">${bdt}</div>
            <div class="bdt-lbl">BDT</div>
          </div>
          <div>
            <div class="teams-row">${teams}</div>
            <div class="venue-row"><svg width="10" height="10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="opacity:.5;flex-shrink:0"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>${m.v}</div>
            <div class="badges"><span class="badge badge-${m.s}">${SLB[m.s]||m.s}</span>${m.g?`<span class="badge badge-grp">গ্রুপ ${m.g}</span>`:''}</div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
  if(!window._scrolled){window._scrolled=true;setTimeout(()=>{const f=document.querySelector('.is-today');if(f)f.scrollIntoView({behavior:'smooth',block:'center'});},300);}
  scheduleTodayNotif(todayMs);
}

// ─── Groups ──────────────────────────────────────────────────────────────────
let openGrps=new Set(Object.keys(GROUPS));
function renderGroups(q){
  document.getElementById('todayBanner').innerHTML='';
  const el=document.getElementById('mainContent');
  const entries=Object.entries(GROUPS).filter(([gk,teams])=>!q||gk.toLowerCase().includes(q)||teams.some(t=>(t.n+t.f).toLowerCase().includes(q)));
  if(!entries.length){el.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><p>কিছু পাওয়া যায়নি</p></div>';return;}
  el.innerHTML='<div style="padding:10px 0">'+entries.map(([gk,teams])=>{
    const isOpen=openGrps.has(gk);
    const ft=q?teams.filter(t=>(t.n+t.f).toLowerCase().includes(q)||gk.toLowerCase().includes(q)):teams;
    return`<div class="grp-block">
      <div class="grp-header${isOpen?' open':''}" onclick="toggleGrp('${gk}')">
        <span>গ্রুপ ${gk} <span style="color:var(--muted);font-weight:400;font-size:11px;margin-left:6px">${ft.length} দল</span></span>
        <span class="arr">▼</span>
      </div>
      <div class="grp-teams${isOpen?' open':''}" id="grp-${gk}">
        ${ft.map(t=>`<div class="team-row"><span class="team-flag">${t.f}</span><span>${t.n}${t.host?' 🏠':''}</span></div>`).join('')}
      </div>
    </div>`;
  }).join('')+'</div>';
}
function toggleGrp(gk){if(openGrps.has(gk))openGrps.delete(gk);else openGrps.add(gk);renderGroups(document.getElementById('searchInput').value.toLowerCase().trim())}

// ─── Teams ────────────────────────────────────────────────────────────────────
function renderTeams(q){
  document.getElementById('todayBanner').innerHTML='';
  const el=document.getElementById('mainContent');
  const all=Object.entries(GROUPS).flatMap(([g,ts])=>ts.map(t=>({...t,group:g})));
  const filtered=all.filter(t=>!q||(t.n+t.f).toLowerCase().includes(q));
  if(!filtered.length){el.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><p>কোনো দল পাওয়া যায়নি</p></div>';return;}
  el.innerHTML=`<div style="padding:10px 0">
    <div style="font-size:12px;color:var(--muted);padding:4px 2px 10px">মোট ${filtered.length}টি দল</div>
    <div class="teams-grid">
      ${filtered.map(t=>`<div class="team-card"><div class="flag">${t.f}</div><div><div class="tname">${t.n}${t.host?' 🏠':''}</div><div class="tgrp">গ্রুপ ${t.group}</div></div></div>`).join('')}
    </div>
  </div>`;
}

// ─── Stadiums ────────────────────────────────────────────────────────────────
function renderStadiums(q){
  document.getElementById('todayBanner').innerHTML='';
  const el=document.getElementById('mainContent');
  const filtered=STADIUMS.filter(s=>!q||(s.name+s.city+s.country).toLowerCase().includes(q));
  if(!filtered.length){el.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><p>কিছু পাওয়া যায়নি</p></div>';return;}
  el.innerHTML=`<div style="padding:10px 0">
    <div style="font-size:12px;color:var(--muted);padding:4px 2px 10px">মোট ${filtered.length}টি স্টেডিয়াম</div>
    ${filtered.map(s=>`<div class="stadium-card">
      <span style="font-size:22px">🏟️</span>
      <div class="stadium-info">
        <div class="sname">${s.full}</div>
        <div class="scity">📍 ${s.city} &nbsp;·&nbsp; ধারণক্ষমতা: ${s.cap}</div>
      </div>
      <span class="country-badge ${s.cls}">${s.country}</span>
    </div>`).join('')}
  </div>`;
}

// ─── Notification ─────────────────────────────────────────────────────────────
let notifOn=localStorage.getItem('notif')==='1';
function updateNotifBtn(){const b=document.getElementById('notifBtn');document.getElementById('notifIcon').textContent=notifOn?'🔔':'🔕';document.getElementById('notifTxt').textContent=notifOn?'চালু':'Notification';b.classList.toggle('on',notifOn)}
async function toggleNotif(){
  if(!('Notification' in window)){showToast('এই browser-এ সাপোর্ট নেই');return;}
  if(notifOn){notifOn=false;localStorage.setItem('notif','0');updateNotifBtn();showToast('নোটিফিকেশন বন্ধ');return;}
  const p=await Notification.requestPermission();
  if(p==='granted'){notifOn=true;localStorage.setItem('notif','1');updateNotifBtn();showToast('✅ প্রতিদিন সকাল ৯টায় notification পাবেন!');scheduleTodayNotif(RAW.filter(m=>getBDDate(m)===todayBDT()));}
  else showToast('❌ Permission দিন Settings থেকে');
}
function scheduleTodayNotif(ms){
  if(!notifOn||!('serviceWorker' in navigator))return;
  navigator.serviceWorker.ready.then(r=>{if(r.active)r.active.postMessage({type:'SCHEDULE_NOTIFICATION',matches:ms.map(m=>({time:getBDT(m),teams:m.t2?`${m.t1} বনাম ${m.t2}`:m.t1}))})});
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}
function closeModal(e){if(e.target.id==='modalBg')closeModalDirect()}
function closeModalDirect(){document.getElementById('modalBg').classList.remove('open')}
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;if(!localStorage.getItem('installDismissed'))document.getElementById('installBanner').classList.remove('hidden')});
function installApp(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(r=>{if(r.outcome==='accepted'){showToast('✅ Install হচ্ছে!');localStorage.setItem('installDismissed','1')}deferredPrompt=null;document.getElementById('installBanner').classList.add('hidden')})}}
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(console.error);
updateNotifBtn();
renderContent();
</script>
</body>
</html>
